syntax = "proto3";

// 定义包名 Package names are used to prevent name clashes between protocol message types
//and also will be used to generate code.
package proto;

// protoc -I pb/ --go_out=. --go_opt=module=github.com/go-example/gRPC/token  --go-grpc_out=. --go-grpc_opt=module=github.com/go-example/gRPC/token  pb/basicauth.proto

option go_package = "github.com/go-example/gRPC/token/pb";

service ProductInfo {
  rpc addProduct(Product) returns (ProductID);
  rpc getProduct(ProductID) returns (Product);
}

message Product {
  string id = 1;
  string name = 2;
  string description = 3;
  float price = 4;
}

message ProductID {
  string value = 1;
}