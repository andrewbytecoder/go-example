syntax = "proto3";
// 定义包名
package proto;

// protoc -I pb/ --go_out=. --go_opt=module=github.com/go-example/gRPC/mutualls  --go-grpc_out=. --go-grpc_opt=module=github.com/go-example/gRPC/mutualls  pb/mutualtls.proto

option go_package = "github.com/go-example/gRPC/mutualls/pb";
service ProductInfo {
  rpc addProduct(Product) returns (ProductID);
  rpc getProduct(ProductID) returns (Product);
}

message Product {
  string id = 1;
  string name = 2;
  string description = 3;
  float price = 4;
}

message ProductID {
  string value = 1;
}