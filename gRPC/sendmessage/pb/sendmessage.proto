syntax = "proto3";


// 定义包名 Package names are used to prevent name clashes between protocol message types
//and also will be used to generate code.
package proto;

// protoc -I pb/ --go_out=. --go_opt=module=github.com/go-example/gRPC/sendmessage  --go-grpc_out=. --go-grpc_opt=module=github.com/go-example/gRPC/sendmessage  pb/sendmessage.proto


option go_package = "github.com/go-example/gRPC/sendmessage/pb";

// 定义SendMessage服务  Defining the service interface of a gRPC service.
service SendMessage {
  rpc addProduct (Product) returns (ProductID) {}
  rpc getProduct (ProductID) returns (Product) {}

}

message Product {
  int32 id = 1;
  string  name = 2;
  string description = 3;
}

message ProductID {
  int32 id = 1;
}
